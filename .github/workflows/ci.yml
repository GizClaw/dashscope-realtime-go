name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Modernize check
        shell: bash
        run: |
          diff_output="$(go fix -diff ./...)"
          if [[ -n "$diff_output" ]]; then
            printf '%s\n' "$diff_output"
            exit 1
          fi

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...
